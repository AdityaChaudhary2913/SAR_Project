data:
  raw_dir: data/raw
  processed_dir: data/processed
  train_split: 0.8
  tile_size: 256
  norm_min: -25.0
  norm_max: 0.0
  max_nodata_ratio: 0.10   # skip chips with >10% nodata pixels
  min_flood_ratio: 0.003    # skip chips with <0.3% flood pixels

train:
  batch_size: 8
  epochs: 50
  lr: 0.0001
  val_split: 0.2
  device: cuda

model:
  in_channels: 2
  features: [32, 64, 128, 256]

paths:
  checkpoints: "checkspots"
  results: "results"